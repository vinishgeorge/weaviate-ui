 services:
  weaviate-ui: 
    command: uvicorn weaviate_ui.main:app --host 0.0.0.0 --port 7777 --reload
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "7777:7777"
    environment:
      - WEAVIATE_HOST=host.docker.internal
      - WEAVIATE_PORT=80
      - WEAVIATE_SECURE=
      - WEAVIATE_GRPC_HOST=host.docker.internal
      - WEAVIATE_GRPC_PORT=50051
      - WEAVIATE_GRPC_SECURE=
      # - WEAVIATE_AUTH_CREDENTIALS=
      - WEAVIATE_USERNAME=xxx
      - WEAVIATE_PASSWORD=xxx
    volumes:
      - ./weaviate_ui:/app/weaviate_ui
      # - ./frontend/dist:/app/static # Uncomment this line if you want to use a local frontend build
